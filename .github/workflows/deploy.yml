name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Package Lambda
        working-directory: .
        run: scripts/package_lambda.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=clouder-core/prod/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Sync GitHub secrets to SSM Parameter Store
        working-directory: .
        run: |
          aws ssm put-parameter --name /clouder/perplexity/api_key \
            --value "${{ secrets.PERPLEXITY_API_KEY }}" \
            --type SecureString --overwrite
          aws ssm put-parameter --name /clouder/spotify/client_id \
            --value "${{ secrets.SPOTIFY_CLIENT_ID }}" \
            --type SecureString --overwrite
          aws ssm put-parameter --name /clouder/spotify/client_secret \
            --value "${{ secrets.SPOTIFY_CLIENT_SECRET }}" \
            --type SecureString --overwrite

      - name: Terraform apply (base infra)
        run: terraform apply -auto-approve -input=false -var="environment=prod" -var="canonicalization_enabled=true" -var="ai_search_enabled=true" -var="spotify_search_enabled=true" -var="perplexity_api_key_ssm_parameter=/clouder/perplexity/api_key" -var="spotify_client_id_ssm_parameter=/clouder/spotify/client_id" -var="spotify_client_secret_ssm_parameter=/clouder/spotify/client_secret" -var="enable_secretsmanager_vpc_endpoint=false"

      - name: Enable temporary Secrets Manager VPC endpoint
        run: terraform apply -auto-approve -input=false -var="environment=prod" -var="canonicalization_enabled=true" -var="ai_search_enabled=true" -var="spotify_search_enabled=true" -var="perplexity_api_key_ssm_parameter=/clouder/perplexity/api_key" -var="spotify_client_id_ssm_parameter=/clouder/spotify/client_id" -var="spotify_client_secret_ssm_parameter=/clouder/spotify/client_secret" -var="enable_secretsmanager_vpc_endpoint=true"

      - name: Run DB migrations via Lambda
        run: |
          MIGRATION_FN="$(terraform output -raw migration_lambda_function_name)"
          aws lambda invoke \
            --function-name "$MIGRATION_FN" \
            --payload '{"action":"upgrade","revision":"head"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/migration-response.json \
            > /tmp/migration-meta.json

          python - <<'PY'
          import json
          import pathlib
          import sys

          meta = json.loads(pathlib.Path("/tmp/migration-meta.json").read_text())
          raw_response = pathlib.Path("/tmp/migration-response.json").read_text() or "{}"
          try:
              response = json.loads(raw_response)
          except json.JSONDecodeError:
              response = {"raw": raw_response}

          print("Migration invoke meta:", json.dumps(meta, ensure_ascii=False))
          print("Migration lambda response:", json.dumps(response, ensure_ascii=False))

          if meta.get("FunctionError"):
              sys.exit("Migration Lambda returned FunctionError")

          if isinstance(response, dict) and response.get("status") != "ok":
              sys.exit("Migration Lambda returned non-ok status")
          PY

      - name: Disable temporary Secrets Manager VPC endpoint
        if: always()
        run: terraform apply -auto-approve -input=false -var="environment=prod" -var="canonicalization_enabled=true" -var="ai_search_enabled=true" -var="spotify_search_enabled=true" -var="perplexity_api_key_ssm_parameter=/clouder/perplexity/api_key" -var="spotify_client_id_ssm_parameter=/clouder/spotify/client_id" -var="spotify_client_secret_ssm_parameter=/clouder/spotify/client_secret" -var="enable_secretsmanager_vpc_endpoint=false"
