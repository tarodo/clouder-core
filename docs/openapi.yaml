- name: user
  description: Routes for any authenticated user.
- name: admin
  description: Admin-gated ingest endpoints.
paths:
  /auth/login:
    get:
      summary: Start Spotify OAuth flow.
      responses:
        '302':
          description: Redirect to Spotify consent.
          headers:
            Location:
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
              description: Sets oauth_state and oauth_verifier cookies.
        '400':
          description: redirect_uri not in allow-list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      description: Generates PKCE state + verifier cookies, then 302-redirects to
        `accounts.spotify.com/authorize`. Cookies are HttpOnly Secure SameSite=Lax,
        max_age=600.
      parameters:
      - name: redirect_uri
        in: query
        schema:
          type: string
        description: Optional frontend-relative path to bounce back to after successful
          login. Must be in ALLOWED_FRONTEND_REDIRECTS.
      security: []
      tags:
      - auth
  /auth/callback:
    get:
      summary: Complete Spotify OAuth flow.
      responses:
        '200':
          description: Login succeeded. Returns JWT and Spotify access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: csrf_state_mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: premium_required. Body includes upgrade_url. No DB write performed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: oauth_exchange_failed (Spotify HTTP error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      description: Validates state cookie, exchanges code for Spotify tokens, blocks
        non-Premium users, creates session, issues JWT access+refresh tokens. Sets
        refresh_token cookie (HttpOnly Secure SameSite=Strict, Path=/auth/refresh,
        max_age=7d).
      parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
      - name: state
        in: query
        required: true
        schema:
          type: string
      security: []
      tags:
      - auth
  /auth/refresh:
    post:
      summary: Rotate access + refresh tokens.
      responses:
        '200':
          description: New JWT and Spotify access token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: refresh_invalid (missing/expired/invalid cookie), refresh_replay_detected
            (old refresh token reused — all sessions revoked), or spotify_revoked
            (Spotify returned invalid_grant; vendor token deleted, re-OAuth required).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      description: Reads refresh-JWT from cookie, verifies session, decrypts stored
        Spotify refresh-token via KMS, calls Spotify refresh-grant, re-encrypts new
        tokens, rotates session. Sets new refresh_token cookie.
      security: []
      tags:
      - auth
  /auth/logout:
    post:
      summary: Log out current session.
      responses:
        '204':
          description: Logged out (or no-op if no valid session).
      description: 'Reads refresh-JWT cookie, marks session as revoked. Idempotent:
        returns 204 even if cookie is missing or invalid.'
      security: []
      tags:
      - auth
  /me:
    get:
      summary: Current user profile + active sessions.
      responses:
        '200':
          description: User and active sessions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401': &id001
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403': &id002
          description: Authenticated but lacks required role (admin).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - user
  /me/sessions/{session_id}:
    delete:
      summary: Revoke one of the current user's sessions.
      responses:
        '204':
          description: Session revoked.
        '400':
          description: cannot_revoke_current.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session does not belong to the calling user (or does not exist).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401': *id001
        '403': *id002
      description: Cannot revoke the current session (use /auth/logout instead).
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      security:
      - BearerAuth: []
      tags:
      - user
  /collect_bp_releases:
    post:
      summary: Trigger Beatport weekly releases ingest.
      responses:
        '200':
          description: Run created. Ingest enqueued (or skipped if disabled).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectResponse'
        '400':
          description: validation_error.
