                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: beatport_unavailable / spotify_unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      description: Fetches Beatport releases for the given ISO week + style, writes
        raw snapshot to S3, enqueues canonicalization (and optionally AI label search
        if `search_label_count` provided).
