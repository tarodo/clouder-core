components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 JWT issued by /auth/callback or /auth/refresh.
  schemas:
    CollectRequestIn:
      additionalProperties: false
      properties:
        bp_token:
          minLength: 1
          title: Bp Token
          type: string
        style_id:
          exclusiveMinimum: 0
          title: Style Id
          type: integer
        iso_year:
          maximum: 2100
          minimum: 2000
          title: Iso Year
          type: integer
        iso_week:
          maximum: 53
          minimum: 1
          title: Iso Week
          type: integer
        search_label_count:
          anyOf:
          - maximum: 200
            minimum: 1
            type: integer
          - type: 'null'
          default: null
          title: Search Label Count
      required:
      - bp_token
      - style_id
      - iso_year
      - iso_week
      title: CollectRequestIn
      type: object
    ErrorResponse:
      type: object
      required:
      - error_code
      - message
      properties:
        error_code:
          type: string
        message:
          type: string
        correlation_id:
          type: string
        upgrade_url:
          type: string
          description: Present only on premium_required (HTTP 403).
    UserProfile:
      type: object
      required:
      - id
      - spotify_id
      - is_admin
      properties:
        id:
          type: string
        spotify_id:
          type: string
        display_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        is_admin:
          type: boolean
    SessionRow:
      type: object
      required:
      - id
      - created_at
      - last_used_at
      - current
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        user_agent:
          type: string
          nullable: true
        current:
          type: boolean
    TokenResponse:
      type: object
      required:
      - access_token
      - spotify_access_token
      - expires_in
      properties:
        access_token:
          type: string
          description: 'HS256 JWT; pass as `Authorization: Bearer <token>`.'
        spotify_access_token:
          type: string
          description: Spotify Web Playback SDK access token (Spotify-issued).
        expires_in:
          type: integer
          description: Lifetime of access_token in seconds.
        user:
          $ref: '#/components/schemas/UserProfile'
        correlation_id:
          type: string
    RefreshResponse:
      type: object
      required:
      - access_token
      - spotify_access_token
      - expires_in
      properties:
        access_token:
          type: string
        spotify_access_token:
          type: string
        expires_in:
          type: integer
        correlation_id:
          type: string
    MeResponse:
      allOf:
      - $ref: '#/components/schemas/UserProfile'
      - type: object
        required:
        - sessions
        properties:
          sessions:
            type: array
            items:
              $ref: '#/components/schemas/SessionRow'
    RunResponse:
      type: object
      required:
      - run_id
      - status
      properties:
        run_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - RAW_SAVED
          - QUEUED
          - PROCESSING
          - COMPLETED
          - FAILED
        processed_counts:
          type: object
          properties:
            processed:
              type: integer
            total:
              type: integer
        error:
          type: object
          nullable: true
          properties:
            code:
              type: string
            message:
              type: string
            phase:
              type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
    CollectResponse:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        iso_year:
          type: integer
        iso_week:
          type: integer
        s3_object_key:
          type: string
        item_count:
          type: integer
        duration_ms:
          type: integer
        run_status:
          type: string
        processing_status:
          type: string
          enum:
          - QUEUED
          - FAILED_TO_QUEUE
        processing_outcome:
          type: string
        processing_reason:
          type: string
          nullable: true
        search_labels_enqueued:
          type: integer
          description: Count of labels sent to AI search SQS. Zero if `search_label_count`
            was omitted.
