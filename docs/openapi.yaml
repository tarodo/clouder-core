info:
  title: Clouder Core API
  version: 1.0.0
  description: 'Beatport ingest pipeline + Spotify OAuth user auth (spec-A).


    Authorization: most routes require a Bearer JWT issued by `/auth/callback` or
    `/auth/refresh`. Admin-only routes additionally require `is_admin=true` on the
    JWT (set from `ADMIN_SPOTIFY_IDS` env var on each login).


    **Generated** by `scripts/generate_openapi.py` — do not edit by hand.'
