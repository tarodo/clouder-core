info:
  title: Clouder Core API
  version: 1.0.0
  description: 'Beatport ingest pipeline + Spotify OAuth user auth (spec-A) + category/triage
    curation (spec-C/D).


    ## Authentication


    All endpoints except `/auth/login` and `/auth/callback` require a JWT Bearer token
    in `Authorization: Bearer <token>`.


    **How to get a token (manual / Postman flow):**

    1. Open `GET /auth/login` in a browser → redirects to Spotify consent.

    2. After approve, Spotify redirects to `/auth/callback?code=...&state=...`.

    3. Callback returns JSON `{access_token, spotify_access_token, expires_in, user,
    correlation_id}` and sets the refresh JWT as an HttpOnly cookie scoped to `/auth/refresh`.

    4. Use `access_token` in `Authorization: Bearer ...` for every subsequent call.

    5. When `access_token` expires (default 30m), `POST /auth/refresh` (no body —
    the refresh JWT is read from the cookie) → new access token plus a rotated refresh
    cookie.


    ## Admin endpoints


    `POST /collect_bp_releases` and `GET /tracks/spotify-not-found` require `is_admin=true`
    on the JWT, set from the `ADMIN_SPOTIFY_IDS` env var on each login.


    ## Error envelope


    All domain errors return `{error_code, message, correlation_id}`. API Gateway
    503 (cold-start timeout) returns `{"message":"Service Unavailable"}` (capital
    S/U) — retry the request after a few seconds.


    **Generated** by `scripts/generate_openapi.py` — do not edit by hand.'
