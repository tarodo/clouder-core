      responses:
        '200':
          description: Tracks moved.
          content:
            application/json:
              schema:
                type: object
                required:
                - moved
                properties:
                  moved:
                    type: integer
                  correlation_id:
                    type: string
        '404':
          description: triage_block_not_found / bucket_not_found / tracks_not_in_source.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: invalid_state (block is FINALIZED) or inactive_bucket.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: validation_error (track_ids empty / >1000 / non-uuid).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401': *id001
        '403': *id002
      description: 'Both buckets must belong to the same block. Capped at 1000 track_ids
        per call. Idempotent: tracks already in `to_bucket_id` are silently no-op
        (counted in `moved` only when actually moved).'
