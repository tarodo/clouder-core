        '404':
          description: playlist_not_found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401': *id001
        '403': *id002
      description: HEADs the S3 object to verify size/content-type, then stores the
        cover key on the playlist. Rejects oversized or missing objects.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - s3_key
              properties:
                s3_key:
                  type: string
              additionalProperties: false
      security:
      - BearerAuth: []
      tags:
      - user
  /playlists/{id}/cover:
    delete:
      summary: Clear the playlist cover.
      responses:
        '200':
          description: Cover cleared (idempotent).
          content:
            application/json:
              schema:
                type: object
        '404':
          description: playlist_not_found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401': *id001
        '403': *id002
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      security:
      - BearerAuth: []
      tags:
      - user
  /playlists/{id}/tracks/import-spotify:
    post:
      summary: Import tracks from a Spotify playlist URL/URI.
      responses:
        '201':
          description: Import accepted; returns counts.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: invalid_spotify_ref.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: playlist_not_found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          description: spotify_not_authorized (user has no Spotify OAuth token).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: spotify_upstream_error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401': *id001
        '403': *id002
      description: Resolves the Spotify playlist via the user's stored OAuth token,
        upserts vendor refs into clouder_tracks, and appends them to the target playlist
        (deduped against existing membership).
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - spotify_ref
              properties:
                spotify_ref:
                  type: string
                  description: Spotify playlist URL, URI, or bare id.
              additionalProperties: false
            example:
              spotify_ref: https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M
      security:
      - BearerAuth: []
      tags:
      - user
  /playlists/{id}/publish:
    post:
      summary: Publish the playlist to the user's Spotify account.
      responses:
        '200':
          description: Playlist published; returns Spotify playlist id.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: nothing_to_publish (playlist has no tracks).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: playlist_not_found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: confirm_overwrite_required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          description: spotify_not_authorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: spotify_upstream_error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401': *id001
        '403': *id002
      description: Creates or overwrites the linked Spotify playlist with the current
        track list and metadata (name, description, cover). On overwrite the client
        must pass `confirm_overwrite=true` to acknowledge destructive replacement
        of remote contents.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                confirm_overwrite:
                  type: boolean
                  default: false
              additionalProperties: false
            example:
              confirm_overwrite: true
      security:
      - BearerAuth: []
      tags:
      - user
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 JWT issued by /auth/callback or /auth/refresh.
  schemas:
    AdminIngestRequestIn:
      additionalProperties: false
      properties:
        style_id:
          exclusiveMinimum: 0
          title: Style Id
          type: integer
        week_year:
          maximum: 2100
          minimum: 2000
          title: Week Year
          type: integer
        week_number:
          maximum: 53
          minimum: 1
          title: Week Number
          type: integer
        period_start:
          anyOf:
          - format: date
            type: string
          - type: 'null'
          default: null
          title: Period Start
        period_end:
          anyOf:
          - format: date
            type: string
          - type: 'null'
          default: null
          title: Period End
        bp_token:
          minLength: 1
          title: Bp Token
          type: string
      required:
      - style_id
      - week_year
      - week_number
      - bp_token
      title: AdminIngestRequestIn
      type: object
    CollectRequestIn:
      additionalProperties: false
      properties:
        bp_token:
          minLength: 1
          title: Bp Token
          type: string
        style_id:
          exclusiveMinimum: 0
          title: Style Id
          type: integer
        iso_year:
          maximum: 2100
          minimum: 2000
          title: Iso Year
          type: integer
        iso_week:
          maximum: 53
          minimum: 1
          title: Iso Week
          type: integer
      required:
      - bp_token
      - style_id
      - iso_year
      - iso_week
      title: CollectRequestIn
      type: object
    CreateTriageBlockIn:
      additionalProperties: false
      properties:
        style_id:
          maxLength: 36
          minLength: 36
          title: Style Id
          type: string
        name:
          maxLength: 128
          minLength: 1
          title: Name
          type: string
        date_from:
          format: date
          title: Date From
          type: string
        date_to:
          format: date
          title: Date To
          type: string
      required:
      - style_id
      - name
      - date_from
      - date_to
      title: CreateTriageBlockIn
      type: object
    MoveTracksIn:
      additionalProperties: false
      properties:
        from_bucket_id:
          maxLength: 36
          minLength: 36
          title: From Bucket Id
          type: string
        to_bucket_id:
          maxLength: 36
          minLength: 36
          title: To Bucket Id
          type: string
        track_ids:
          items:
            type: string
          maxItems: 1000
          minItems: 1
          title: Track Ids
          type: array
      required:
      - from_bucket_id
      - to_bucket_id
      - track_ids
      title: MoveTracksIn
      type: object
    TransferTracksIn:
      additionalProperties: false
      properties:
        target_bucket_id:
          maxLength: 36
          minLength: 36
          title: Target Bucket Id
          type: string
        track_ids:
          items:
            type: string
          maxItems: 1000
          minItems: 1
          title: Track Ids
          type: array
      required:
      - target_bucket_id
      - track_ids
      title: TransferTracksIn
      type: object
    ErrorResponse:
      type: object
      required:
      - error_code
      - message
      properties:
        error_code:
          type: string
        message:
          type: string
        correlation_id:
          type: string
        upgrade_url:
          type: string
          description: Present only on premium_required (HTTP 403).
    UserProfile:
      type: object
      required:
      - id
      - spotify_id
      - is_admin
      properties:
        id:
          type: string
        spotify_id:
          type: string
        display_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        is_admin:
          type: boolean
    SessionRow:
      type: object
      required:
      - id
      - created_at
      - last_used_at
      - current
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        user_agent:
          type: string
          nullable: true
        current:
          type: boolean
    TokenResponse:
      type: object
      required:
      - access_token
      - spotify_access_token
      - expires_in
      properties:
        access_token:
          type: string
          description: 'HS256 JWT; pass as `Authorization: Bearer <token>`.'
        spotify_access_token:
          type: string
          description: Spotify Web Playback SDK access token (Spotify-issued).
        expires_in:
          type: integer
          description: Lifetime of access_token in seconds.
        user:
          $ref: '#/components/schemas/UserProfile'
        correlation_id:
          type: string
    RefreshResponse:
      type: object
      required:
      - access_token
      - spotify_access_token
      - expires_in
      properties:
        access_token:
          type: string
        spotify_access_token:
          type: string
        expires_in:
          type: integer
        correlation_id:
          type: string
    MeResponse:
      allOf:
      - $ref: '#/components/schemas/UserProfile'
      - type: object
        required:
        - sessions
        properties:
          sessions:
            type: array
            items:
              $ref: '#/components/schemas/SessionRow'
    RunResponse:
      type: object
      required:
      - run_id
      - status
      properties:
        run_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - RAW_SAVED
          - QUEUED
          - PROCESSING
          - COMPLETED
          - FAILED
        processed_counts:
          type: object
          properties:
            processed:
              type: integer
            total:
              type: integer
        error:
          type: object
          nullable: true
          properties:
            code:
              type: string
            message:
              type: string
            phase:
              type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
    CollectResponse:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        iso_year:
          type: integer
        iso_week:
          type: integer
        s3_object_key:
          type: string
        item_count:
          type: integer
        duration_ms:
          type: integer
        run_status:
          type: string
        processing_status:
          type: string
          enum:
          - QUEUED
          - FAILED_TO_QUEUE
        processing_outcome:
          type: string
        processing_reason:
          type: string
          nullable: true
        search_labels_enqueued:
          type: integer
          description: Count of labels sent to AI search SQS. Zero if `search_label_count`
            was omitted.
    LabelEnrichRunResponse: *id015
    LabelSummary:
      type: object
      required:
      - id
      - name
      - style
      - status
      properties:
        id:
          type: string
        name:
          type: string
        style:
          type: string
        status:
          type: string
          enum:
          - none
          - queued
          - running
          - completed
          - failed
          - outdated
        info:
          type:
          - object
          - 'null'
          properties:
            tagline:
              type:
              - string
              - 'null'
            country:
              type:
              - string
              - 'null'
            primary_styles:
              type: array
              items:
                type: string
            activity:
              type: string
              enum:
              - unknown
              - dormant
              - low
              - steady
              - high
              - fire_hose
            updated_at:
              type: string
              format: date-time
    LabelsListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LabelSummary'
        next_cursor:
          type:
          - string
          - 'null'
    LabelDetail:
      type: object
      description: Sanitized LabelInfo (admin-only fields stripped).
      additionalProperties: true
    BacklogLabel:
      type: object
      required:
      - id
      - name
      - style
      - status
      - track_count
      properties:
        id:
          type: string
        name:
          type: string
        style:
          type: string
        status:
          type: string
          enum:
          - none
          - failed
          - outdated
        track_count:
          type: integer
        last_attempted_at:
          type:
          - string
          - 'null'
          format: date-time
    BacklogResponse:
      type: object
      required:
      - items
      - total_estimate
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BacklogLabel'
        next_cursor:
          type:
          - string
          - 'null'
        total_estimate:
          type: integer
    RunsListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LabelEnrichRunResponse'
        next_cursor:
          type:
          - string
          - 'null'
    EnrichmentOptions:
      type: object
      required:
      - vendors
      - prompt_versions
      - default_models
      - merge
      properties:
        vendors:
          type: array
          items:
            type: string
        prompt_versions:
          type: array
          items:
            type: object
            properties:
              slug:
                type: string
              version:
                type: string
              is_default:
                type: boolean
        default_models:
          type: object
          additionalProperties:
            type: string
        merge:
          type: object
          properties:
            vendor:
              type: string
            default_model:
              type: string
