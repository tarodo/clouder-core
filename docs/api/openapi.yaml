          format: uuid
      - *id006
      - *id007
      - *id008
      - name: search
        in: query
        schema:
          type: string
        description: Lowercased + trimmed before matching against clouder_tracks.normalized_title
          (ILIKE %term%).
      - name: tags
        in: query
        schema:
          type: string
        description: CSV of user_tag UUIDs. Filters the page to tracks carrying the
          listed tag(s) per `match`. Unknown tag ids are silently ignored. Empty /
          absent → no tag filtering.
      - name: match
        in: query
        schema:
          type: string
          enum:
          - all
          - any
        description: Tag-set semantics. `all` (default) = every listed tag must be
          present on the track. `any` = at least one match suffices.
      - name: fresh
        in: query
        schema:
          type: integer
          enum:
          - 0
          - 1
        description: Hide tracks already used in any playlist. 1=on, 0/absent=off.
