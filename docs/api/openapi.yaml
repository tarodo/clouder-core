                - transferred
                properties:
                  transferred:
                    type: integer
                  correlation_id:
                    type: string
        '404':
          description: triage_block_not_found / bucket_not_found / tracks_not_in_source.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: invalid_state (target block not IN_PROGRESS), inactive_bucket,
