                            type: object
                            required:
                            - id
                            - name
                            - color
                            properties:
                              id:
                                type: string
                                format: uuid
                              name:
                                type: string
                              color:
                                type:
                                - string
                                - 'null'
                                pattern: ^#[0-9A-Fa-f]{6}$
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                  correlation_id:
                    type: string
        '400':
          description: invalid_match (match must be 'all' or 'any').
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: category_not_found.
          content:
            application/json:
