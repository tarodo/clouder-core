                      properties:
                        id:
                          type: string
                          format: uuid
                        bucket_type:
                          type: string
                          enum:
                          - NEW
                          - OLD
                          - NOT
                          - DISCARD
                          - UNCLASSIFIED
                          - STAGING
                        category_id:
                          type:
                          - string
